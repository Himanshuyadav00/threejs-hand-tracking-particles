<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gesture Particle System</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

video{
position:absolute;
right:10px;
bottom:10px;
width:200px;
opacity:0.4;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

</head>

<body>

<video id="video" autoplay playsinline></video>

<script>

let scene,camera,renderer,particles,geometry,material;

const particleCount = 4000;

let currentShape = 0;

const shapes=[];

init();
animate();
initHandTracking();

function init(){

scene = new THREE.Scene();

camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.z = 5;

renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const positions = new Float32Array(particleCount*3);

for(let i=0;i<positions.length;i++){
positions[i]=(Math.random()-0.5)*5;
}

geometry = new THREE.BufferGeometry();
geometry.setAttribute(
"position",
new THREE.BufferAttribute(positions,3)
);

material = new THREE.PointsMaterial({
size:0.03,
color:0xffffff
});

particles = new THREE.Points(geometry,material);

scene.add(particles);

window.addEventListener("resize",()=>{

camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);

});

initShapes();

}

function initShapes(){

shapes.push(heartShape);
shapes.push(flowerShape);
shapes.push(saturnShape);
shapes.push(sphereShape);

}

function heartShape(t){

const x=16*Math.pow(Math.sin(t),3);

const y=
13*Math.cos(t)
-5*Math.cos(2*t)
-2*Math.cos(3*t)
-Math.cos(4*t);

return new THREE.Vector3(x*0.05,y*0.05,0);

}

function flowerShape(t){

const r=Math.sin(6*t);

const x=r*Math.cos(t);
const y=r*Math.sin(t);

return new THREE.Vector3(x,y,0);

}

function saturnShape(t){

const r=2;

const x=r*Math.cos(t);
const z=r*Math.sin(t);

return new THREE.Vector3(x,0,z);

}

function sphereShape(t){

const phi=Math.acos(1-2*Math.random());
const theta=2*Math.PI*Math.random();

const x=Math.sin(phi)*Math.cos(theta);
const y=Math.sin(phi)*Math.sin(theta);
const z=Math.cos(phi);

return new THREE.Vector3(x,y,z);

}

function applyShape(shape){

const pos=geometry.attributes.position.array;

for(let i=0;i<particleCount;i++){

const t=i/particleCount*Math.PI*2;

const v=shape(t);

pos[i*3]=v.x;
pos[i*3+1]=v.y;
pos[i*3+2]=v.z;

}

geometry.attributes.position.needsUpdate=true;

}

function nextShape(){

currentShape++;

if(currentShape>=shapes.length)
currentShape=0;

applyShape(shapes[currentShape]);

}

function expandParticles(scale){

const pos=geometry.attributes.position.array;

for(let i=0;i<pos.length;i++){

pos[i]*=scale;

}

geometry.attributes.position.needsUpdate=true;

}

function fireworks(){

const pos=geometry.attributes.position.array;

for(let i=0;i<pos.length;i++){

pos[i]=(Math.random()-0.5)*10;

}

geometry.attributes.position.needsUpdate=true;

}

function animate(){

requestAnimationFrame(animate);

particles.rotation.y+=0.002;

renderer.render(scene,camera);

}

function initHandTracking(){

const video=document.getElementById("video");

const hands=new Hands({

locateFile:(file)=>{
return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
}

});

hands.setOptions({

maxNumHands:2,
modelComplexity:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7

});

hands.onResults(onResults);

const cam=new Camera(video,{
onFrame:async()=>{
await hands.send({image:video});
},
width:640,
height:480
});

cam.start();

}

function distance(a,b){

const dx=a.x-b.x;
const dy=a.y-b.y;

return Math.sqrt(dx*dx+dy*dy);

}

function isPinch(hand){

return distance(hand[4],hand[8])<0.04;

}

function isFist(hand){

return distance(hand[8],hand[0])<0.15;

}

function isOpenPalm(hand){

return distance(hand[8],hand[0])>0.4;

}

let lastX=0;

function detectSwipe(hand){

let x=hand[9].x;

let dx=x-lastX;

lastX=x;

if(Math.abs(dx)>0.15){

nextShape();

}

}

function onResults(results){

if(!results.multiHandLandmarks) return;

const hands=results.multiHandLandmarks;

if(hands.length==2){

fireworks();
return;

}

const hand=hands[0];

if(isPinch(hand)){

material.color.set(
Math.random(),
Math.random(),
Math.random()
);

}

if(isOpenPalm(hand)){

expandParticles(1.02);

}

if(isFist(hand)){

expandParticles(0.98);

}

detectSwipe(hand);

}

</script>

</body>
</html>
